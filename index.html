<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente de IA 3D - Fluxo Contínuo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020202;
            overflow: hidden;
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body>

    <script>
        // 1. CONFIGURAÇÃO DO CENÁRIO
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. ARQUITETURA
        const networkArchitecture = [5, 8, 8, 3];
        const layers = [];
        const distanceBetweenLayers = 45;
        const spread = 28;

        const neuronMatNormal = new THREE.MeshBasicMaterial({ color: 0x004455, transparent: true, opacity: 0.4 });
        const neuronMatActive = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const synapseMatNormal = new THREE.LineBasicMaterial({ color: 0x002233, transparent: true, opacity: 0.2 });
        const dataPointMat = new THREE.PointsMaterial({ color: 0x0088aa, size: 0.4, transparent: true, opacity: 0.5 });

        const neuronGeometry = new THREE.SphereGeometry(1.2, 16, 16);
        
        for (let i = 0; i < networkArchitecture.length; i++) {
            let neuronsInLayer = [];
            const xPos = (i - (networkArchitecture.length - 1) / 2) * distanceBetweenLayers;
            for (let j = 0; j < networkArchitecture[i]; j++) {
                const mesh = new THREE.Mesh(neuronGeometry, neuronMatNormal);
                mesh.position.set(xPos, (Math.random() - 0.5) * spread * 1.5, (Math.random() - 0.5) * spread * 1.5);
                scene.add(mesh);
                neuronsInLayer.push(mesh);
            }
            layers.push(neuronsInLayer);
        }

        // Fios e pontos fixos
        const dataPointsPositions = [];
        for (let i = 0; i < layers.length - 1; i++) {
            for (let n1 of layers[i]) {
                for (let n2 of layers[i+1]) {
                    const geometry = new THREE.BufferGeometry().setFromPoints([n1.position, n2.position]);
                    scene.add(new THREE.Line(geometry, synapseMatNormal));
                    
                    const dist = n1.position.distanceTo(n2.position);
                    const numPoints = Math.floor(dist / 5);
                    for(let p = 1; p < numPoints; p++) {
                        const pointPos = new THREE.Vector3().lerpVectors(n1.position, n2.position, p / numPoints);
                        dataPointsPositions.push(pointPos.x + (Math.random()-0.5), pointPos.y + (Math.random()-0.5), pointPos.z + (Math.random()-0.5));
                    }
                }
            }
        }
        const dpGeo = new THREE.BufferGeometry();
        dpGeo.setAttribute('position', new THREE.Float32BufferAttribute(dataPointsPositions, 3));
        scene.add(new THREE.Points(dpGeo, dataPointMat));

        // 3. SISTEMA DE MÚLTIPLOS PULSOS (7 PONTOS)
        const pulses = [];
        const numSimultaneousPulses = 7;

        class Pulse {
            constructor() {
                this.mesh = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
                this.light = new THREE.PointLight(0x00ffff, 1.5, 20);
                this.mesh.add(this.light);
                scene.add(this.mesh);
                this.reset();
            }

            reset() {
                const path = [];
                let currentNode = layers[0][Math.floor(Math.random() * layers[0].length)];
                path.push(currentNode);
                for (let i = 1; i < layers.length; i++) {
                    currentNode = layers[i][Math.floor(Math.random() * layers[i].length)];
                    path.push(currentNode);
                }
                this.curve = new THREE.CatmullRomCurve3(path.map(n => n.position));
                this.progress = 0;
                this.speed = 0.002 + Math.random() * 0.003;
                this.activeNodes = path;
            }

            update() {
                this.progress += this.speed;
                if (this.progress >= 1) {
                    this.reset();
                } else {
                    const pos = this.curve.getPointAt(this.progress);
                    this.mesh.position.copy(pos);
                }
            }
        }

        for (let i = 0; i < numSimultaneousPulses; i++) {
            pulses.push(new Pulse());
        }

        // Câmera
        camera.position.set(-60, 30, 60);
        let targetPulseIndex = 0;

        // Troca o foco da câmera entre os 7 pulsos periodicamente
        setInterval(() => {
            targetPulseIndex = Math.floor(Math.random() * numSimultaneousPulses);
        }, 4000);

        function animate() {
            requestAnimationFrame(animate);
            
            pulses.forEach(p => p.update());

            // A câmera segue o pulso alvo atual
            const activePulse = pulses[targetPulseIndex];
            const currentPos = activePulse.mesh.position;
            const tangent = activePulse.curve.getTangentAt(activePulse.progress).normalize();
            
            const cameraOffset = new THREE.Vector3(-tangent.x * 20, 8, -tangent.z * 20);
            const targetCamPos = currentPos.clone().add(cameraOffset);
            
            camera.position.lerp(targetCamPos, 0.05);
            camera.lookAt(currentPos);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
